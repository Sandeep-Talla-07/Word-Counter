<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Orbitron:wght@400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Pliant:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">
    <!-- <link rel="stylesheet" href="Style/style-1.css"> -->
    <title>Word Counter App</title>
</head>

<body>
    <div class="container">
        <h2>Word Counter</h2>
        <div class="field">
            <label for="text">Enter text below:</label>
            <textarea name="text" id="text" rows="10" cols="60" placeholder="Start typing..."></textarea>
        </div>

        <div id="stat">You're written <span class="sat-highlight">0</span> words and <span
                class="sat-highlight">0</span> characters</div>
    </div>

    <script src="JS/word-count.js"></script>
    <script src="JS/app.js"></script>
</body>

</html>
